<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fource.Plex — Logowanie</title>
<link rel="icon" type="image/png" href="plex.favicon.png">
<link rel="stylesheet" href="fourceplex-theme.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
  html,body{height:100%;margin:0;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:var(--sans)}
  .login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:40px 36px;width:340px;max-width:95vw;text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px}
  .login-logo{height:28px;margin-bottom:4px}
  .login-title{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);letter-spacing:.04em}
  .login-sub{font-size:13px;color:var(--text3);font-family:var(--mono)}
  .btn-google{display:flex;align-items:center;gap:10px;padding:12px 24px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;width:100%;justify-content:center}
  .btn-google:hover{opacity:.85}
  .btn-google svg{flex-shrink:0}
  .login-error{color:#f87171;font-size:12px;font-family:var(--mono);display:none;background:rgba(248,113,113,.1);padding:8px 12px;border-radius:6px;width:100%}
  .login-spinner{display:none;font-size:13px;color:var(--text3);font-family:var(--mono)}
</style>
</head>
<body>
<div class="login-box">
  <img src="logo-dark.png" class="login-logo fp-logo-dark" alt="Fource.Plex">
  <img src="logo-light.png" class="login-logo fp-logo-light" alt="Fource.Plex" style="display:none">
  <div class="login-title">FOURCE.PLEX</div>
  <div class="login-sub">Zaloguj się kontem @fource.com</div>
  <button class="btn-google" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Zaloguj się przez Google
  </button>
  <div class="login-error" id="login-error"></div>
  <div class="login-spinner" id="login-spinner">Logowanie…</div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCUsvjkzYG3AVROysZh9BtN2_vagSSyMww",authDomain:"fourceplex-market.firebaseapp.com",projectId:"fourceplex-market",storageBucket:"fourceplex-market.firebasestorage.app",messagingSenderId:"300062366060",appId:"1:300062366060:web:0cf7bd4128bea35cc63b49"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

// Jeśli już zalogowany — przekieruj od razu
auth.onAuthStateChanged(user=>{
  if(user&&user.email&&user.email.endsWith('@fource.com')){
    window.location.href='index.html';
  }
});

async function signInWithGoogle(){
  const errEl=document.getElementById('login-error');
  const spinner=document.getElementById('login-spinner');
  errEl.style.display='none';
  spinner.style.display='block';
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({hd:'fource.com'});
    const result=await auth.signInWithPopup(provider);
    const email=result.user.email;
    if(!email||!email.endsWith('@fource.com')){
      await auth.signOut();
      errEl.textContent='Dostęp tylko dla kont @fource.com';
      errEl.style.display='block';
      spinner.style.display='none';
      return;
    }
    window.location.href='index.html';
  }catch(e){
    spinner.style.display='none';
    if(e.code==='auth/popup-closed-by-user')return;
    errEl.textContent='Błąd logowania: '+e.message;
    errEl.style.display='block';
  }
}
</script>
</body>
</html>
